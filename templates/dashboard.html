<!DOCTYPE html>
<html>
<head>
    <title>Security Analytics Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">
    <h1>📊 Security Analytics Dashboard</h1>

    <div class="dashboard-grid">
        <div class="card total">
            <h2>Total Predictions</h2>
            <p>{{ total }}</p>
        </div>

        <div class="card legit">
            <h2>Legitimate Websites</h2>
            <p>{{ legit_count }}</p>
        </div>

        <div class="card phishing">
            <h2>Phishing Websites</h2>
            <p>{{ phishing_count }}</p>
        </div>

        <div class="card percentage">
            <h2>Phishing Percentage</h2>
            <p>{{ phishing_percentage }}%</p>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="phishingChart"></canvas>
    </div>

    <br>
    <a href="/">⬅ Back to Home</a>
</div>

<script>
    const ctx = document.getElementById('phishingChart').getContext('2d');

    const phishingChart = new Chart(ctx, {
        type: 'pie',
        data: {
            labels: ['Legitimate', 'Phishing'],
            datasets: [{
                data: [{{ legit_count }}, {{ phishing_count }}],
                backgroundColor: ['#16a34a', '#dc2626']
            }]
        },
        options: {
            plugins: {
                legend: {
                    labels: {
                        color: 'white'
                    }
                }
            }
        }
    });
</script>

</body>
</html>
